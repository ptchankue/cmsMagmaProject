<footer xmlns:th="http://www.thymeleaf.org" th:fragment="footer" class="gov-footer">
    <div class="gov-footer-inner">
        <div class="gov-footer-grid">
            <div class="gov-footer-col">
                <div th:if="${parameters['gov_footer_col1'] != null}" th:utext="${parameters['gov_footer_col1']}"></div>
                <th:block th:if="${parameters['gov_footer_col1'] == null}">
                    <h4 th:text="${parameters['footerCol1Title'] != null ? parameters['footerCol1Title'] : 'Department'}">Department</h4>
                    <ul>
                        <li><a href="#">About us</a></li>
                        <li><a href="#">Ministry</a></li>
                        <li><a href="#">Branches</a></li>
                        <li><a href="#">Careers</a></li>
                    </ul>
                </th:block>
            </div>
            <div class="gov-footer-col">
                <div th:if="${parameters['gov_footer_col2'] != null}" th:utext="${parameters['gov_footer_col2']}"></div>
                <th:block th:if="${parameters['gov_footer_col2'] == null}">
                    <h4 th:text="${parameters['footerCol2Title'] != null ? parameters['footerCol2Title'] : 'Resources'}">Resources</h4>
                    <ul>
                        <li><a href="#">Strategies &amp; plans</a></li>
                        <li><a href="#">Legislation</a></li>
                        <li><a href="#">Tenders</a></li>
                        <li><a href="#">PAIA</a></li>
                    </ul>
                </th:block>
            </div>
            <div class="gov-footer-col">
                <div th:if="${parameters['gov_footer_col3'] != null}" th:utext="${parameters['gov_footer_col3']}"></div>
                <th:block th:if="${parameters['gov_footer_col3'] == null}">
                    <h4 th:text="${parameters['footerCol3Title'] != null ? parameters['footerCol3Title'] : 'Information'}">Information</h4>
                    <ul>
                        <li><a href="#">Government links</a></li>
                        <li><a href="#">Media releases</a></li>
                        <li><a href="#">Statistics</a></li>
                    </ul>
                </th:block>
            </div>
            <div class="gov-footer-col">
                <div th:if="${parameters['gov_footer_col4'] != null}" th:utext="${parameters['gov_footer_col4']}"></div>
                <th:block th:if="${parameters['gov_footer_col4'] == null}">
                    <h4 th:text="${parameters['footerCol4Title'] != null ? parameters['footerCol4Title'] : 'Help'}">Help</h4>
                    <ul>
                        <li><a href="#">Contact centre</a></li>
                        <li><a href="#">Complaints</a></li>
                        <li><a href="#">Sitemap</a></li>
                        <li><a href="#">Disclaimer</a></li>
                    </ul>
                </th:block>
            </div>
        </div>
        <nav class="gov-footer-site-nav" aria-label="Footer site links"
             th:if="${parameters['footerMenu'] != null and !#lists.isEmpty(parameters['footerMenu'])}">
            <ul class="gov-footer-site-links">
                <li th:each="menu : ${parameters['footerMenu']}">
                    <th:block th:replace="~{fragments/cms_nav :: navAnchor(link=${menu}, activeClass='gov-footer-link-active')}"></th:block>
                </li>
            </ul>
        </nav>
        <div class="gov-footer-bottom">
            <span th:text="${parameters['copyright'] != null ? parameters['copyright'] : '© Government portal demo · Replace with your legal notice.'}">©</span>
        </div>
    </div>
</footer>
