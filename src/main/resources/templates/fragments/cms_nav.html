<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Anchor only; wrap in <li> in parent. activeClass e.g. gov-nav-active; use '' for cms1 (active stays on li). -->
<th:block th:fragment="navAnchor (link, activeClass)">
    <a th:if="${link.page != null and parameters != null and parameters.get('site') != null and parameters.get('navUseViewPath') == true}"
       th:href="@{/view/{pid}(pid=${link.page.id})}"
       th:classappend="${activeClass != null and !#strings.isEmpty(activeClass) and @navMenu.linkTargetsPage(link, parameters != null ? parameters.get('activeNavPageId') : null)} ? ${activeClass} : null"
       th:text="${link.title}">Nav</a>
    <a th:if="${link.page != null and parameters != null and parameters.get('site') != null and (parameters.get('navUseViewPath') == null or parameters.get('navUseViewPath') == false)}"
       th:href="@{/site/{sid}/view(sid=${parameters.get('site').id},page=${link.page.id})}"
       th:classappend="${activeClass != null and !#strings.isEmpty(activeClass) and @navMenu.linkTargetsPage(link, parameters != null ? parameters.get('activeNavPageId') : null)} ? ${activeClass} : null"
       th:text="${link.title}">Nav</a>
    <a th:if="${link.page == null and link.pageUrl != null and !#strings.isEmpty(link.pageUrl) and #strings.startsWith(link.pageUrl,'http')}"
       th:href="${link.pageUrl}"
       target="_blank"
       rel="noopener noreferrer"
       th:text="${link.title}">Nav</a>
    <a th:if="${link.page == null and link.pageUrl != null and !#strings.isEmpty(link.pageUrl) and !#strings.startsWith(link.pageUrl,'http')}"
       th:href="${link.pageUrl}"
       th:text="${link.title}">Nav</a>
    <a th:if="${link.page == null and (link.pageUrl == null or #strings.isEmpty(link.pageUrl))}"
       href="#"
       th:text="${link.title}">Nav</a>
</th:block>
</body>
</html>
