<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/demo-shell :: head(pageTitle='Upload')}">
    <title>Upload</title>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-100 via-slate-50 to-slate-200 text-slate-800 antialiased">
<div th:replace="~{fragments/demo-shell :: mainNav(active='upload')}"></div>
<main class="mx-auto max-w-lg px-4 py-10 md:px-6 md:py-14">
    <div class="overflow-hidden rounded-2xl border border-slate-200/80 bg-white shadow-xl shadow-slate-300/30">
        <div class="border-b border-slate-100 bg-slate-50 px-8 py-6 md:px-10">
            <p class="text-xs font-bold uppercase tracking-widest text-indigo-600">Multipart</p>
            <h1 class="mt-2 text-2xl font-bold tracking-tight text-slate-900">Upload file</h1>
            <p class="mt-2 text-sm text-slate-600">Files are written under the configured upload directory. Flash messages show after redirect.</p>
        </div>
        <div class="px-8 py-6 md:px-10">
            <div th:if="${message}"
                 th:classappend="${#strings.contains(message,'successfully')} ? ' border-emerald-200 bg-emerald-50 text-emerald-900' : ' border-amber-200 bg-amber-50 text-amber-900'"
                 class="mb-6 rounded-xl border px-4 py-3 text-sm font-medium">
                <span th:text="${message}">Message</span>
            </div>
            <form th:action="@{/upload}" method="post" enctype="multipart/form-data" class="space-y-6">
                <div>
                    <label for="files" class="mb-2 block text-sm font-medium text-slate-700">File to upload</label>
                    <input id="files" type="file" name="files"
                           class="block w-full cursor-pointer rounded-xl border border-slate-300 bg-white text-sm text-slate-600 file:mr-4 file:rounded-lg file:border-0 file:bg-indigo-50 file:px-4 file:py-3 file:text-sm file:font-semibold file:text-indigo-700 hover:file:bg-indigo-100 focus:outline-none focus:ring-4 focus:ring-indigo-500/15"/>
                </div>
                <div>
                    <label for="text1" class="mb-2 block text-sm font-medium text-slate-700">Notes (client-side preview)</label>
                    <textarea id="text1" rows="4" onchange="update()" oninput="update()"
                              placeholder="Type here — preview updates below…"
                              class="w-full resize-y rounded-xl border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-500/15"></textarea>
                </div>
                <button type="submit"
                        class="w-full rounded-xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-600/25 transition hover:bg-indigo-700 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 active:scale-[0.99]">
                    Submit
                </button>
            </form>
            <div class="mt-6 rounded-xl border border-dashed border-slate-200 bg-slate-50/80 px-4 py-3">
                <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Live preview</p>
                <p id="area" class="mt-2 min-h-[1.5rem] whitespace-pre-wrap text-sm text-slate-700"></p>
            </div>
        </div>
    </div>
</main>
<script>
    function update() {
        document.getElementById('area').innerText = document.getElementById('text1').value;
    }
</script>
</body>
</html>
