<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<!--/*/ <th:block th:include="admin/_head :: head" th:with="parameters=${parameters}"></th:block>/*/-->

<body id="page-top">
<div id="wrapper">
  <!--/*/ <th:block th:include="admin/_sidebar :: sidebar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
      <!--/*/ <th:block th:include="admin/_topbar :: topbar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
      <div class="container-fluid">
        <div class="d-sm-flex align-items-center justify-content-between mb-4 flex-wrap">
          <h1 class="h3 mb-0 text-gray-800" th:text="${cmsPage.id != null} ? |Edit page · ${cmsPage.title}| : 'New page'">Edit page</h1>
          <div class="mt-2 mt-sm-0">
            <a th:if="${cmsPage.site != null and cmsPage.site.id != null}"
               th:href="@{/admin/site(id=${cmsPage.site.id})}" class="btn btn-sm btn-outline-secondary">Back to pages</a>
            <a th:if="${cmsPage.id != null}" th:href="@{/view/{id}(id=${cmsPage.id})}" class="btn btn-sm btn-info" target="_blank" rel="noopener">View public</a>
          </div>
        </div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="row">
          <div class="col-lg-8">
            <div class="card shadow mb-4">
              <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Page details</h6>
              </div>
              <div class="card-body">
                <form th:action="@{/admin/edit/page}" th:object="${cmsPage}" method="post">
                  <input type="hidden" th:field="*{id}" th:if="*{id != null}"/>
                  <input type="hidden" name="site.id" th:value="${cmsPage.site?.id}" th:if="${cmsPage.site != null and cmsPage.site.id != null}"/>
                  <input type="hidden" name="siteId" th:value="${cmsPage.site?.id}" th:if="${cmsPage.id == null and cmsPage.site != null}"/>
                  <div class="form-group">
                    <label for="pageTitle">Title</label>
                    <input class="form-control" id="pageTitle" type="text" th:field="*{title}" required/>
                  </div>
                  <div class="form-group">
                    <label for="url">URL slug</label>
                    <input class="form-control" id="url" type="text" th:field="*{url}" required placeholder="home"/>
                    <small class="form-text text-muted">Used in links; use lowercase words separated by hyphens.</small>
                  </div>
                  <div class="form-group">
                    <label for="body">Body</label>
                    <textarea class="form-control" id="body" rows="10" th:field="*{body}" placeholder="Main content (HTML allowed when viewing publicly)"></textarea>
                  </div>
                  <div class="form-group form-check">
                    <input class="form-check-input" type="checkbox" id="online" th:field="*{online}"/>
                    <label class="form-check-label" for="online">Published (online)</label>
                  </div>
                  <button type="submit" class="btn btn-primary">Save page</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-lg-4" th:if="${cmsPage.id != null}">
            <div class="card shadow mb-4">
              <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Sections</h6>
              </div>
              <div class="card-body">
                <p class="small text-muted" th:if="${#lists.isEmpty(parameters['sections'])}">No sections on this page yet.</p>
                <ul class="list-group list-group-flush" th:if="${!#lists.isEmpty(parameters['sections'])}">
                  <li class="list-group-item d-flex justify-content-between align-items-center px-0"
                      th:each="sec : ${parameters['sections']}">
                    <span th:text="${sec.title}">Section</span>
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/admin/edit/section(id=${sec.id},template=${sec.template})}">Edit</a>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!--/*/ <th:block th:include="admin/_footer :: footer"></th:block>/*/-->
  </div>
</div>
<!--/*/ <th:block th:include="admin/_footer :: modals"></th:block>/*/-->
<!--/*/ <th:block th:include="admin/_scripts :: scripts"></th:block>/*/-->
</body>
</html>
