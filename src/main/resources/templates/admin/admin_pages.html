<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<!--/*/ <th:block th:include="admin/_head :: head" th:with="parameters=${parameters}"></th:block>/*/-->

<body id="page-top">
<div id="wrapper">
  <!--/*/ <th:block th:include="admin/_sidebar :: sidebar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
      <!--/*/ <th:block th:include="admin/_topbar :: topbar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
      <div class="container-fluid">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="d-sm-flex align-items-center justify-content-between mb-4 flex-wrap" th:if="${parameters.containsKey('site') and parameters.site != null}">
          <h1 class="h3 mb-0 text-gray-800" th:text="|Pages · ${parameters.site.name}|">Pages</h1>
          <div class="mt-2 mt-sm-0">
            <a th:href="@{/admin/edit/page(siteId=${parameters.site.id})}" class="btn btn-sm btn-primary shadow-sm">
              <i class="fas fa-plus fa-sm text-white-50"></i> New page
            </a>
            <a th:href="@{/public/site/{id}(id=${parameters.site.id})}" class="btn btn-sm btn-outline-info" target="_blank" rel="noopener">View site</a>
            <a th:href="@{/admin/site/edit(id=${parameters.site.id})}" class="btn btn-sm btn-outline-secondary">Edit site</a>
            <a th:href="@{/admin/sites}" class="btn btn-sm btn-link">All sites</a>
          </div>
        </div>

        <div class="alert alert-warning" th:if="${!parameters.containsKey('site') or parameters.site == null}">
          Site not found. <a th:href="@{/admin/sites}">Return to sites</a>
        </div>

        <div class="row" th:if="${parameters.containsKey('site') and parameters.site != null}">
          <div class="col-xl-8 col-lg-7">
            <div class="card shadow mb-4">
              <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Pages in this site</h6>
              </div>
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                    <thead>
                    <tr>
                      <th>Id</th>
                      <th>Title</th>
                      <th>Url</th>
                      <th>Online</th>
                      <th>Updated</th>
                      <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(parameters['pages'])}">
                      <td colspan="6" class="text-center text-muted">No pages yet. Create one with <strong>New page</strong>.</td>
                    </tr>
                    <tr th:each="page : ${parameters['pages']}">
                      <td>
                        <a th:href="@{/admin/edit/page(id=${page.id})}" th:text="${page.id}">1</a>
                      </td>
                      <td th:text="${page.title}">Title</td>
                      <td th:text="${page.url}">slug</td>
                      <td th:text="${page.online}">true</td>
                      <td th:text="${page.updated != null ? #dates.format(page.updated, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
                      <td class="text-nowrap">
                        <a th:href="@{/view/{id}(id=${page.id})}" class="btn btn-sm btn-outline-primary" target="_blank" rel="noopener">View</a>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div class="col-xl-4 col-lg-5">
            <div class="card shadow mb-4">
              <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Site</h6>
              </div>
              <div class="card-body">
                <p><strong>Template:</strong> <span th:text="${parameters.site.template}">cms1</span></p>
                <p th:if="${parameters.site.host != null and !#strings.isEmpty(parameters.site.host)}">
                  <strong>Host:</strong> <span th:text="${parameters.site.host}">—</span>
                </p>
                <p class="mb-0"><strong>Language:</strong> <span th:text="${parameters.site.language}">en</span></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!--/*/ <th:block th:include="admin/_footer :: footer"></th:block>/*/-->
  </div>
</div>
<!--/*/ <th:block th:include="admin/_footer :: modals"></th:block>/*/-->
<!--/*/ <th:block th:include="admin/_scripts :: scripts"></th:block>/*/-->
</body>
</html>
