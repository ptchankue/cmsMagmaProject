<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

<!--/*/ <th:block th:include="admin/_head :: head" th:with="parameters=${parameters}"></th:block>/*/-->

<body id="page-top">
<div id="wrapper">
  <!--/*/ <th:block th:include="admin/_sidebar :: sidebar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">
      <!--/*/ <th:block th:include="admin/_topbar :: topbar" th:with="pageTitle=${pageTitle}"></th:block>/*/-->
      <div class="container-fluid">
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
          <h1 class="h3 mb-0 text-gray-800" th:text="${siteEntity.id != null} ? 'Edit site' : 'New site'">Site</h1>
          <a th:href="@{/admin/sites}" class="btn btn-sm btn-outline-secondary">Back to sites</a>
        </div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="card shadow mb-4 col-lg-8 px-0">
          <div class="card-body">
            <form th:action="@{/admin/site/save}" th:object="${siteEntity}" method="post">
              <input type="hidden" th:field="*{id}" th:if="*{id != null}"/>
              <div class="form-group">
                <label for="name">Name</label>
                <input class="form-control" id="name" type="text" th:field="*{name}" required placeholder="My website"/>
              </div>
              <div class="form-group">
                <label for="host">Host (optional)</label>
                <input class="form-control" id="host" type="text" th:field="*{host}" placeholder="www.example.com"/>
              </div>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="email">Email</label>
                  <input class="form-control" id="email" type="email" th:field="*{email}"/>
                </div>
                <div class="form-group col-md-6">
                  <label for="phone">Phone</label>
                  <input class="form-control" id="phone" type="text" th:field="*{phone}"/>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="language">Language</label>
                  <input class="form-control" id="language" type="text" th:field="*{language}" placeholder="en"/>
                </div>
                <div class="form-group col-md-6">
                  <label for="template">Front-end theme</label>
                  <select class="form-control" id="template" th:field="*{template}">
                    <option th:each="t : ${siteThemes}" th:value="${t.id}" th:text="${t.label}">Theme</option>
                  </select>
                  <small class="form-text text-muted" th:if="${siteThemes != null}">
                    <strong>CMS1</strong> = full industry layout; <strong>minimal</strong> = body only (not the same). Paths: <code>templates/themes/&lt;theme&gt;/</code>. Static assets: <code>static/cms1/</code>, <code>static/government/</code>, …
                  </small>
                </div>
              </div>
              <div th:if="${siteThemes != null}" class="form-group">
                <label class="d-block small font-weight-bold text-gray-700">Theme reference</label>
                <ul class="small text-muted mb-0 pl-3">
                  <li th:each="t : ${siteThemes}"><span th:text="${t.label}">Name</span> —
                    <span th:text="${t.description}">Desc</span></li>
                </ul>
              </div>
              <div class="form-group form-check" th:if="${siteEntity.id == null}">
                <input class="form-check-input" type="checkbox" name="seedDefaultPages" value="true" id="seedDefaultPages"/>
                <label class="form-check-label" for="seedDefaultPages">Create starter pages (Home, Contact, About) after save</label>
                <small class="form-text text-muted d-block">Skips any URL that already exists on this site.</small>
              </div>
              <button type="submit" class="btn btn-primary">Save site</button>
              <a th:if="${siteEntity.id != null}" th:href="@{/admin/site(id=${siteEntity.id})}" class="btn btn-link">Manage pages</a>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!--/*/ <th:block th:include="admin/_footer :: footer"></th:block>/*/-->
  </div>
</div>
<!--/*/ <th:block th:include="admin/_footer :: modals"></th:block>/*/-->
<!--/*/ <th:block th:include="admin/_scripts :: scripts"></th:block>/*/-->
</body>
</html>
